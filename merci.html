
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Confirmation & Quiz Santé</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9f5ff;
      color: #4b2e83;
      padding: 20px;
      text-align: center;
    }
    .logo {
      max-width: 200px;
      margin-bottom: 20px;
    }
    .confirmation {
      background: #e0d4f7;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 30px;
    }
    .quiz {
      background: #fff;
      border: 2px solid #c3b1e1;
      border-radius: 10px;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    .question {
      margin-bottom: 20px;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #7a4fcf;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #5e3aa3;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
    }
    .return-btn {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 25px;
      background: #4b2e83;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
<link rel="stylesheet" href="./assets/css/v11-ressources-emploi.css">
</head>
<body>

  <img src="./wp-content/uploads/2025/09/equilibre-vital-logo-transparent.png" alt="Logo Équilibre Vital" class="logo">

  <div class="confirmation">
    <h2>✅ Merci pour votre message !</h2>
    <p>Nous vous répondrons dans les plus brefs délais.</p>
    <p>En attendant, découvrez notre mini quiz santé & bien-être 👇</p>
  </div>

  <div class="quiz">
    <h3>🧘 Quiz : Bouger pour mieux vivre</h3>
    <div id="quiz-container"></div>
    <div id="result"></div>
  </div>

  <a href="./index.html" class="return-btn">Retour sur PSSR</a>
  <a href="https://" class="return-btn">Visiter le site Équilibre Vital</a>

  <script>
    const questions = [
      { text: "Faire 10 minutes de marche par jour peut améliorer l’humeur.", answer: true },
      { text: "Le sport est réservé aux personnes jeunes et en forme.", answer: false },
      { text: "Bouger régulièrement aide à mieux dormir.", answer: true },
      { text: "L’activité physique favorise l’insertion sociale.", answer: true },
      { text: "Il faut aller à la salle de sport pour être en bonne santé.", answer: false }
    ];

    let current = 0;
    let score = 0;

    const container = document.getElementById("quiz-container");
    const result = document.getElementById("result");

    function showQuestion() {
      if (current < questions.length) {
        const q = questions[current];
        container.innerHTML = `
          <div class="question">
            <p>${q.text}</p>
            <button onclick="answer(true)">Vrai</button>
            <button onclick="answer(false)">Faux</button>
          </div>
        `;
      } else {
        container.innerHTML = "";
        result.innerHTML = `👏 Bravo ! Vous avez obtenu ${score}/${questions.length} bonnes réponses.<br>Chaque petit pas compte vers une vie plus équilibrée.`;
      }
    }

    function answer(userAnswer) {
      if (userAnswer === questions[current].answer) score++;
      current++;
      showQuestion();
    }

    showQuestion();
  </script>


<script type="module" src="./assets/js/firebase-contact.js"></script>
<script src="./assets/js/media-fallback.js" defer></script>
</body>
</html>
